<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - ONG</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7fb;
            min-height: 100vh;
            display: flex;
            overflow: hidden;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            width: 250px;
            min-height: 100vh;
            background: #f5f7fb;
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            box-shadow: 4px 0 30px rgba(0,0,0,0.3);
            position: relative;
            z-index: 100;
        }

        .sidebar-logo {
            padding: 40px 28px 28px;
            border-bottom: 1px solid #dddddd;
        }
        .sidebar-logo .org-name {
            font-size: 22px;
            font-weight: 700;
            color: #222;
        }
        .sidebar-logo .org-sub {
            font-size: 12px;
            color: #777;
            margin-top: 4px;
            text-transform: uppercase;
            letter-spacing: 0.08em;
        }

        .sidebar-nav {
            flex: 1;
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .nav-section-label {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #999;
            padding: 10px 12px 6px;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 13px 16px;
            border-radius: 12px;
            cursor: pointer;
            color: #444;
            font-size: 16px;
            font-weight: 600;
            border: none;
            background: transparent;
            width: 100%;
            text-align: left;
            transition: all 0.2s;
        }
        .nav-item:hover {
            background: #f5f5f5;
            color: #000;
            transform: translateX(4px);
        }
        .nav-item.active {
            background: #916eac;
            color: #ffffff;
            box-shadow: 0 8px 20px rgba(0,0,0,0.08);
        }
        .nav-icon { font-size: 18px; width: 22px; text-align: center; flex-shrink: 0; }

        /* ── MAIN ── */
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .topbar {
            background: #ffffff;
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255,255,255,0.2);
            height: 64px;
            display: flex;
            align-items: center;
            padding: 0 36px;
            gap: 14px;
            flex-shrink: 0;
        }

        .hamburger {
            display: none;
            background: none;
            border: none;
            color: #222;
            font-size: 22px;
            cursor: pointer;
        }

        .topbar-title {
            font-size: 16px;
            font-weight: 600;
            color: #666;
        }
        .topbar-title span { color: #111;}

        .topbar-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .avatar {
            width: 38px; height: 38px;
            border-radius: 50%;
            background: #ffffff;
            border: 2px solid #333;
            display: flex; align-items: center; justify-content: center;
            font-size: 15px;
            font-weight: 700;
            color: #333;
        }

        .content-frame {
            flex: 1;
            border: none;
            width: 100%;
            height: calc(100vh - 64px);
        }

        /* ── OVERLAY mobile ── */
        .overlay {
            display: none;
            position: fixed; inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 90;
        }

        @media (max-width: 768px) {
            .sidebar {
                position: fixed;
                top: 0; left: 0;
                height: 100vh;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }
            .sidebar.open { transform: translateX(0); }
            .hamburger { display: block; }
            .overlay.show { display: block; }
        }
    </style>
</head>
<body>

<aside class="sidebar" id="sidebar">
    <div class="sidebar-logo">
        <div class="org-name">🎛️ Panel Admin</div>
        <div class="org-sub">Gestión ONG</div>
    </div>

    <nav class="sidebar-nav">
        
        <div class="nav-section-label">Dashboard</div>
        <button class="nav-item active" onclick="navegarA('contenido-admin/dashboard.html', 'dashboard', this)">
            <span class="nav-icon">📰</span> dashboard
        </button>
        <div class="nav-section-label">Noticias</div>
        <button class="nav-item" onclick="navegarA('contenido-admin/noticias-admin.html', 'Noticias', this)">
            <span class="nav-icon">📰</span> Noticias
        </button>

        <div class="nav-section-label">Soporte</div>
        <button class="nav-item" onclick="navegarA('contenido-admin/Editarencuesta.html', 'Editar encuesta', this)">
            <span class="nav-icon">🙋</span> Editar encuesta
        </button>

        <div class="nav-section-label">Encuesta</div>
        <button class="nav-item" onclick="navegarA('contenido-admin/encuestas.html', 'Encuesta', this)">
            <span class="nav-icon">📝</span> encuesta
        </button>
        <button class="nav-item" onclick="navegarA('contenido-admin/resultados.html', 'resultados', this)">
            <span class="nav-icon">📰</span> resultados
    </nav>
</aside>

<div class="overlay" id="overlay" onclick="cerrarSidebar()"></div>

<div class="main">
    <header class="topbar">
        <button class="hamburger" onclick="abrirSidebar()">☰</button>
        <div class="topbar-title">Panel / <span id="current-section">Noticias</span></div>
        <div class="topbar-right">
            <div class="avatar">A</div>
        </div>
    </header>
    <iframe class="content-frame" id="content-frame" src="contenido-admin/dashboard.html"></iframe>
</div>

<script>
    function navegarA(url, titulo, el) {
        document.getElementById('content-frame').src = url;
        document.getElementById('current-section').textContent = titulo;
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        cerrarSidebar();
    }
    function abrirSidebar() {
        document.getElementById('sidebar').classList.add('open');
        document.getElementById('overlay').classList.add('show');
    }
    function cerrarSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('overlay').classList.remove('show');
    }
</script>
</body>
</html>
