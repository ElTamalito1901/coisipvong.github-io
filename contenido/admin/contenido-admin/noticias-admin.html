<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Admin - Noticias ONG</title>
    <link rel="stylesheet" href="../../../css/noticias-admin.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>🎛️ Panel de Administración</h1>
        </div>

        <div id="message-container"></div>

        <!-- FORMULARIO ARRIBA - ANCHO COMPLETO -->
        <div class="panel form-panel">
            <h2>➕ <span id="form-title">Agregar Nueva Noticia</span></h2>

            <div class="info-box">
                <h3>💡 Consejo</h3>
                <p>Marca una noticia como "destacada" para que aparezca en la sección principal. Puedes subir
                    imágenes desde tu PC.</p>
            </div>

            <form id="noticia-form">
                <input type="hidden" id="noticia-id">

                <!-- Fila 1: Título + Autor -->
                <div class="form-row-2">
                    <div class="form-group">
                        <label>Título *</label>
                        <input type="text" id="titulo" required placeholder="Ej: Gran Feria Comunitaria 2025">
                    </div>
                    <div class="form-group">
                        <label>Autor *</label>
                        <input type="text" id="autor" required placeholder="Ej: María González">
                    </div>
                </div>

                <!-- Fila 2: Descripción completa -->
                <div class="form-group">
                    <label>Descripción Completa *</label>
                    <textarea id="descripcion" required
                        placeholder="Describe la noticia con todos los detalles importantes..."></textarea>
                </div>

                <!-- Fila 3: Categoría + Fecha + Avatar -->
                <div class="form-row-3">
                    <div class="form-group">
                        <label>Categoría *</label>
                        <select id="categoria" required>
                            <option value="">Seleccionar categoría</option>
                            <option value="eventos">Eventos</option>
                            <option value="logros">Logros</option>
                            <option value="testimonios">Testimonios</option>
                            <option value="proyectos">Proyectos</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Fecha de Publicación *</label>
                        <input type="date" id="fecha" required>
                    </div>
                    <div class="form-group">
                        <label>Avatar del Autor (emoji)</label>
                        <input type="text" id="autorAvatar" placeholder="Ej: 📝, 👤, ✍️" maxlength="2">
                    </div>
                </div>

                <!-- Imagen -->
                <div class="form-group">
                    <label>Imagen *</label>
                    <div class="image-upload-area" id="image-upload-area">
                        <p>📸 Arrastra una imagen aquí o haz clic para seleccionar</p>
                    </div>
                    <input type="file" id="imagen-file" accept="image/*" style="display: none;">
                    <div class="image-preview-container" style="position: relative; display: inline-block; width: 100%;">
                        <img id="image-preview" class="image-preview" alt="Preview" style="width: 100%; border-radius: 10px;">
                        <button type="button" id="remove-image-btn" style="
                            position: absolute;
                            top: 10px;
                            right: 10px;
                            background: rgba(239, 68, 68, 0.8);
                            border: none;
                            color: white;
                            font-size: 18px;
                            border-radius: 50%;
                            width: 30px;
                            height: 30px;
                            cursor: pointer;
                            display: none;
                        ">×</button>
                    </div>
                </div>

                <!-- Destacada + Botones -->
                <div class="form-bottom-row">
                    <div class="checkbox-group">
                        <input type="checkbox" id="destacada">
                        <label for="destacada">⭐ Marcar como noticia destacada</label>
                    </div>
                    <div class="form-actions">
                        <button type="submit" class="btn btn-primary" id="submit-btn">Agregar Noticia</button>
                        <button type="button" class="btn btn-danger" id="cancel-btn" style="display: none;">Cancelar Edición</button>
                    </div>
                </div>
            </form>
        </div>

        <!-- LISTA DE NOTICIAS ABAJO - ANCHO COMPLETO -->
        <div class="panel">
            <h2>📰 Noticias Guardadas (<span id="total-noticias">0</span>)</h2>
            <div class="noticias-list" id="noticias-list">
                <p style="color: #999; text-align: center; padding: 40px;">Cargando noticias...</p>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js';
    import {
        getFirestore, collection, addDoc, getDocs,
        deleteDoc, doc, updateDoc, serverTimestamp
    } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';
    import { getStorage, ref, uploadBytes, getDownloadURL } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-storage.js';

    const firebaseConfig = {
        apiKey: "AIzaSyDCd1Cg19DJZIqtFZC2sKAsg3jKDnt9xg8",
        authDomain: "coisipvong-a8898.firebaseapp.com",
        projectId: "coisipvong-a8898",
        storageBucket: "coisipvong-a8898.firebasestorage.app",
        messagingSenderId: "892210384824",
        appId: "1:892210384824:web:b97ea7ef30c290bf5c094d",
        measurementId: "G-3WMPKT6E6M"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    let noticias = [];
    let editandoId = null;
    let imagenSeleccionada = null;

    const uploadArea = document.getElementById('image-upload-area');
    const fileInput = document.getElementById('imagen-file');
    const preview = document.getElementById('image-preview');
    const removeImageBtn = document.getElementById("remove-image-btn");

    uploadArea.addEventListener('click', () => fileInput.click());
    uploadArea.addEventListener('dragover', (e) => {
        e.preventDefault();
        uploadArea.classList.add('dragover');
    });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
    uploadArea.addEventListener('drop', (e) => {
        e.preventDefault();
        uploadArea.classList.remove('dragover');
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) handleImageFile(file);
    });

    fileInput.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) handleImageFile(file);
    });

    function handleImageFile(file) {
        const reader = new FileReader();
        reader.onload = (e) => {
            preview.src = e.target.result;
            preview.classList.add('show');
            imagenSeleccionada = { type: 'file', data: file };
            removeImageBtn.style.display = 'block';
        };
        reader.readAsDataURL(file);
    }

    removeImageBtn.addEventListener('click', () => {
        preview.src = '';
        preview.classList.remove('show');
        imagenSeleccionada = null;
        removeImageBtn.style.display = 'none';
        fileInput.value = '';
    });

    async function cargarNoticias() {
        try {
            const querySnapshot = await getDocs(collection(db, "noticias"));
            noticias = querySnapshot.docs.map(doc => ({
                id: doc.id,
                ...doc.data()
            }));
            noticias.sort((a, b) => new Date(b.fecha) - new Date(a.fecha));
            renderizarNoticias();
        } catch (error) {
            mostrarMensaje('Error al cargar noticias: ' + error.message, 'error');
        }
    }

    async function subirImagen(file) {
        const timestamp = Date.now();
        const storageRef = ref(storage, `noticias/${timestamp}_${file.name}`);
        await uploadBytes(storageRef, file);
        return await getDownloadURL(storageRef);
    }

    async function guardarNoticia(noticia) {
        try {
            if (editandoId) {
                await updateDoc(doc(db, "noticias", editandoId), {
                    ...noticia,
                    updatedAt: serverTimestamp()
                });
            } else {
                await addDoc(collection(db, "noticias"), {
                    ...noticia,
                    createdAt: serverTimestamp()
                });
            }
            return true;
        } catch (error) {
            throw new Error('Error al guardar: ' + error.message);
        }
    }

    async function eliminarNoticia(id) {
        if (!confirm('¿Estás seguro de eliminar esta noticia?')) return;
        try {
            await deleteDoc(doc(db, "noticias", id));
            mostrarMensaje("🗑️ Noticia eliminada correctamente", 'success');
            cargarNoticias();
        } catch (error) {
            mostrarMensaje('Error al eliminar: ' + error.message, 'error');
        }
    }

    function renderizarNoticias() {
        const lista = document.getElementById("noticias-list");
        document.getElementById("total-noticias").textContent = noticias.length;

        if (noticias.length === 0) {
            lista.innerHTML = `<p style="color: #999; text-align: center; padding: 40px;">No hay noticias guardadas aún</p>`;
            return;
        }

        lista.innerHTML = noticias.map(noticia => `
            <div class="noticia-item ${noticia.destacada ? 'destacada' : ''}">
                ${noticia.imagen ? `<img src="${noticia.imagen}" class="noticia-thumbnail" alt="${noticia.titulo}">` : ''}
                <div class="noticia-item-body">
                    <h4>${noticia.titulo}</h4>
                    <p>${noticia.descripcion.substring(0, 150)}${noticia.descripcion.length > 150 ? '...' : ''}</p>
                    <div class="noticia-meta">
                        <span class="badge badge-categoria">${noticia.categoria}</span>
                        <span class="badge badge-fecha">${formatearFecha(noticia.fecha)}</span>
                        ${noticia.destacada ? '<span class="badge badge-destacada">⭐ Destacada</span>' : ''}
                    </div>
                    <div class="noticia-actions">
                        <button class="btn-small btn-edit" onclick="window.editarNoticia('${noticia.id}')">✏️ Editar</button>
                        <button class="btn-small btn-delete" onclick="window.eliminarNoticia('${noticia.id}')">🗑️ Eliminar</button>
                    </div>
                </div>
            </div>
        `).join("");
    }

    function formatearFecha(fecha) {
        const date = new Date(fecha);
        const meses = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio',
                       'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
        return `${date.getDate()} de ${meses[date.getMonth()]}, ${date.getFullYear()}`;
    }

    document.getElementById("noticia-form").addEventListener("submit", async (e) => {
        e.preventDefault();

        if (!imagenSeleccionada) {
            mostrarMensaje('Por favor selecciona una imagen', 'error');
            return;
        }

        const submitBtn = document.getElementById('submit-btn');
        submitBtn.disabled = true;
        submitBtn.textContent = 'Guardando...';

        try {
            let imagenURL = '';

            if (imagenSeleccionada.type === 'file') {
                imagenURL = await subirImagen(imagenSeleccionada.data);
            } else {
                imagenURL = imagenSeleccionada.data;
            }

            const noticia = {
                titulo: document.getElementById("titulo").value,
                descripcion: document.getElementById("descripcion").value,
                categoria: document.getElementById("categoria").value,
                fecha: new Date(document.getElementById("fecha").value).toISOString(),
                imagen: imagenURL,
                autor: document.getElementById("autor").value,
                autorAvatar: document.getElementById("autorAvatar").value || "👤",
                destacada: document.getElementById("destacada").checked
            };

            await guardarNoticia(noticia);
            mostrarMensaje(editandoId ? "✅ Noticia actualizada" : "✅ Noticia creada correctamente", 'success');
            limpiarFormulario();
            cargarNoticias();
        } catch (error) {
            mostrarMensaje('Error: ' + error.message, 'error');
        } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = editandoId ? 'Actualizar Noticia' : 'Agregar Noticia';
        }
    });

    window.editarNoticia = function (id) {
        const noticia = noticias.find(n => n.id === id);
        if (!noticia) return;

        editandoId = id;

        document.getElementById("titulo").value = noticia.titulo;
        document.getElementById("descripcion").value = noticia.descripcion;
        document.getElementById("categoria").value = noticia.categoria;
        document.getElementById("fecha").value = noticia.fecha.split("T")[0];
        document.getElementById("autor").value = noticia.autor;
        document.getElementById("autorAvatar").value = noticia.autorAvatar;
        document.getElementById("destacada").checked = noticia.destacada;

        if (noticia.imagen) {
            preview.src = noticia.imagen;
            preview.classList.add('show');
            imagenSeleccionada = { type: 'url', data: noticia.imagen };
            removeImageBtn.style.display = 'block';
        }

        document.getElementById("form-title").textContent = "Editar Noticia";
        document.getElementById("submit-btn").textContent = "Actualizar Noticia";
        document.getElementById("cancel-btn").style.display = "inline-block";

        window.scrollTo({ top: 0, behavior: "smooth" });
    };

    window.eliminarNoticia = eliminarNoticia;

    document.getElementById("cancel-btn").addEventListener("click", limpiarFormulario);

    function limpiarFormulario() {
        document.getElementById("noticia-form").reset();
        preview.classList.remove('show');
        preview.src = '';
        imagenSeleccionada = null;
        editandoId = null;
        document.getElementById("form-title").textContent = "Agregar Nueva Noticia";
        document.getElementById("submit-btn").textContent = "Agregar Noticia";
        document.getElementById("cancel-btn").style.display = "none";
    }

    function mostrarMensaje(texto, tipo = 'success') {
        const div = document.createElement("div");
        div.className = tipo === 'success' ? 'success-message' : 'error-message';
        div.textContent = texto;
        const container = document.getElementById("message-container");
        container.innerHTML = "";
        container.appendChild(div);
        setTimeout(() => div.remove(), 4000);
    }

    cargarNoticias();
</script>

</body>
</html>
