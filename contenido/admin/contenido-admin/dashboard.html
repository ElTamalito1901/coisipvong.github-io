<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard – COISIPVONG</title>
<link rel="stylesheet" href="../../../css/dashboard.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.4/dist/chart.umd.min.js"></script>
</head>
<body>

<!-- TOPBAR -->
<div class="topbar">
  <div class="topbar-logo">A</div>
  <div>
    <h1>Dashboard</h1>
    <p>Resumen general de respuestas</p>
  </div>
  <div class="topbar-actions">
    <span class="updated-at" id="updated-at"></span>
    <button class="btn btn-ghost btn-sm" id="btn-refresh">↻ Actualizar</button>
  </div>
</div>

<!-- CONTENT -->
<div class="content">

  <!-- STATS -->
  <div class="stats-row" id="stats-row">
    <div class="stat-card"><div class="spinner"></div></div>
  </div>

  <!-- CHARTS -->
  <div class="charts-row">
    <div class="chart-card chart-card-wide">
      <div class="chart-card-head">
        <h3>Respuestas por día</h3>
        <span class="chart-sub">Últimos 14 días</span>
      </div>
      <div class="chart-wrap">
        <canvas id="chart-tendencia"></canvas>
      </div>
    </div>

    <div class="chart-card">
      <div class="chart-card-head">
        <h3>Por estado</h3>
      </div>
      <div class="chart-wrap chart-wrap-donut">
        <canvas id="chart-estado"></canvas>
      </div>
      <div class="legend" id="legend-estado"></div>
    </div>
  </div>

  <div class="charts-row">
    <div class="chart-card chart-card-wide">
      <div class="chart-card-head">
        <h3>Respuestas por distrito</h3>
        <span class="chart-sub">Top 8</span>
      </div>
      <div class="chart-wrap">
        <canvas id="chart-distrito"></canvas>
      </div>
    </div>
  </div>

  <!-- RECENT -->
  <div class="table-wrap">
    <div class="table-head">
      <h3>Últimas respuestas</h3>
    </div>
    <table>
      <thead>
        <tr>
          <th>Jefe de hogar</th>
          <th>Encuestador/a</th>
          <th>Distrito</th>
          <th>Estado</th>
          <th>Fecha envío</th>
        </tr>
      </thead>
      <tbody id="recent-tbody">
        <tr><td colspan="5"><div class="loading"><div class="spinner"></div><span>Cargando…</span></div></td></tr>
      </tbody>
    </table>
    <div class="empty-msg" id="empty-msg" style="display:none">No hay respuestas todavía.</div>
  </div>

</div>

<script type="module" src="/js/dashboard.js"></script>
</body>
</html>
