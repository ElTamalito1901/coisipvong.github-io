<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noticias - ONG</title>
<link rel="stylesheet" href="../css/noticias.css">
</head>

<body>
    <section class="noticias-header">
        <h1>Noticias y Actualizaciones</h1>
        <p>Mantente informado sobre nuestras actividades, logros y el impacto que estamos generando juntos en las
            comunidades más vulnerables.</p>
    </section>

    <section class="filtros-section">
        <div class="filtros-container">
            <button class="filtro-btn active" data-categoria="todas">Todas</button>
            <button class="filtro-btn" data-categoria="eventos">Eventos</button>
            <button class="filtro-btn" data-categoria="logros">Logros</button>
            <button class="filtro-btn" data-categoria="testimonios">Testimonios</button>
            <button class="filtro-btn" data-categoria="proyectos">Proyectos</button>
        </div>
    </section>

    <div class="loading" id="loading">Cargando noticias...</div>

    <section class="destacada-section" id="destacada-section" style="display: none;"></section>

    <section class="noticias-grid" id="noticias-grid"></section>


    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.11.1/firebase-app.js';
        import { getFirestore, collection, getDocs, query, orderBy } from 'https://www.gstatic.com/firebasejs/10.11.1/firebase-firestore.js';

        const firebaseConfig = {
            apiKey: "AIzaSyDCd1Cg19DJZIqtFZC2sKAsg3jKDnt9xg8",
            authDomain: "coisipvong-a8898.firebaseapp.com",
            projectId: "coisipvong-a8898",
            storageBucket: "coisipvong-a8898.firebasestorage.app",
            messagingSenderId: "892210384824",
            appId: "1:892210384824:web:b97ea7ef30c290bf5c094d",
            measurementId: "G-3WMPKT6E6M"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        let todasLasNoticias = [];

        async function cargarNoticias() {
            try {
                const q = query(collection(db, "noticias"), orderBy("fecha", "desc"));
                const querySnapshot = await getDocs(q);

                todasLasNoticias = querySnapshot.docs.map(doc => ({
                    id: doc.id,
                    ...doc.data()
                }));

                document.getElementById('loading').style.display = 'none';

                if (todasLasNoticias.length === 0) {
                    document.getElementById('noticias-grid').innerHTML = `
                        <div class="no-noticias">
                            <h2>📰 No hay noticias disponibles</h2>
                            <p>Pronto tendremos novedades para compartir</p>
                        </div>
                    `;
                    return;
                }

                renderizarNoticias();
            } catch (error) {
                document.getElementById('loading').innerHTML = `
                    <p style="color: #ef4444;">Error al cargar noticias. Por favor, intenta más tarde.</p>
                `;
                console.error('Error:', error);
            }
        }

        function formatearFecha(fecha) {
            const date = new Date(fecha);
            const meses = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio',
                'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
            return `${date.getDate()} de ${meses[date.getMonth()]}, ${date.getFullYear()}`;
        }

        function renderizarNoticias(filtro = 'todas') {
            let noticiasFiltradas = filtro === 'todas'
                ? todasLasNoticias
                : todasLasNoticias.filter(n => n.categoria === filtro);

            const destacada = noticiasFiltradas.find(n => n.destacada);
            const destacadaSection = document.getElementById('destacada-section');

            if (destacada) {
                destacadaSection.style.display = 'block';
                destacadaSection.innerHTML = `
                    <article class="noticia-destacada">
                        <div class="destacada-imagen">
                            <img src="${destacada.imagen}" alt="${destacada.titulo}">
                            <span class="destacada-badge">Destacado</span>
                        </div>
                        <div class="destacada-contenido">
                            <div class="destacada-categoria">${destacada.categoria}</div>
                            <div class="destacada-fecha">📅 ${formatearFecha(destacada.fecha)}</div>
                            <h2>${destacada.titulo}</h2>
                            <p>${destacada.descripcion.substring(0, 200)}...</p>
                        </div>
                    </article>
                `;

                noticiasFiltradas = noticiasFiltradas.filter(n => !n.destacada);
            } else {
                destacadaSection.style.display = 'none';
            }

            const grid = document.getElementById('noticias-grid');

            if (noticiasFiltradas.length === 0) {
                grid.innerHTML = `
                    <div class="no-noticias">
                        <h2>📰 No hay noticias en esta categoría</h2>
                        <p>Selecciona otra categoría para ver más contenido</p>
                    </div>
                `;
                return;
            }

            const categoriaClases = {
                'eventos': 'categoria-eventos',
                'logros': 'categoria-logros',
                'testimonios': 'categoria-testimonios',
                'proyectos': 'categoria-proyectos'
            };

            grid.innerHTML = noticiasFiltradas.map(noticia => `
                <article class="noticia-card" data-categoria="${noticia.categoria}">
                    <div class="noticia-imagen">
                        <img src="${noticia.imagen}" alt="${noticia.titulo}">
                        <span class="noticia-categoria ${categoriaClases[noticia.categoria]}">${noticia.categoria}</span>
                    </div>
                    <div class="noticia-contenido">
                        <div class="noticia-fecha">📅 ${formatearFecha(noticia.fecha)}</div>
                        <h3>${noticia.titulo}</h3>
                        <p>${noticia.descripcion.substring(0, 150)}${noticia.descripcion.length > 150 ? '...' : ''}</p>
                        <div class="noticia-footer">
                            <div class="noticia-autor">
                                <div class="autor-avatar">${noticia.autorAvatar || '👤'}</div>
                                <span class="autor-nombre">${noticia.autor}</span>
                            </div>
                        </div>
                    </div>
                </article>
            `).join('');
        }

        document.querySelectorAll('.filtro-btn').forEach(filtro => {
            filtro.addEventListener('click', function () {
                document.querySelectorAll('.filtro-btn').forEach(f => f.classList.remove('active'));
                this.classList.add('active');

                const categoria = this.getAttribute('data-categoria');
                renderizarNoticias(categoria);
            });
        });

        cargarNoticias();
    </script>
</body>

</html>
