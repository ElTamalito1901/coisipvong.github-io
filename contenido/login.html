<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - ONG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #916eac 0%, #df602d 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-container {
            background: white;
            padding: 50px;
            border-radius: 15px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
            max-width: 450px;
            width: 100%;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .login-container h2 {
            font-size: 40px;
            color: #916eac;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            font-size: 18px;
            color: #333;
            margin-bottom: 10px;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #ddd;
            border-radius: 8px;
            transition: all 0.3s;
            outline: none;
        }

        .form-group input:focus {
            border-color: #916eac;
            box-shadow: 0 0 0 3px rgba(145, 110, 172, 0.1);
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, #916eac 0%, #916eac 100%);
            color: white;
            border: none;
            padding: 18px;
            font-size: 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            margin-top: 10px;
            box-shadow: 0 5px 20px rgba(145, 110, 172, 0.3);
        }

        .btn-login:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(145, 110, 172, 0.4);
        }

        .btn-login:active {
            transform: translateY(-1px);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .login-container {
                padding: 30px 25px;
            }

            .login-container h2 {
                font-size: 28px;
            }

            .form-group label {
                font-size: 16px;
            }

            .form-group input {
                padding: 12px;
                font-size: 15px;
            }

            .btn-login {
                padding: 15px;
                font-size: 18px;
            }
        }

        /* Animación de entrada */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>

<body>
    <div class="login-container">
        <h2>Iniciar Sesión</h2>
        <form id="loginForm">
            <div class="form-group">
                <label for="email">Correo Electrónico</label>
                <input type="email" id="email" name="email" required placeholder="ejemplo@correo.com">
            </div>

            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" required placeholder="Ingresa tu contraseña">
            </div>

            <button type="submit" class="btn-login">Iniciar Sesión</button>
        </form>
    </div>

<script type="module">
    import { auth } from "../firebase.js";
    import { signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    const form = document.getElementById('loginForm');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();

        try {
            await signInWithEmailAndPassword(auth, email, password);
            window.location.href = "admin/paneladmin.html"; // <-- cambia si tu archivo se llama distinto
        } catch (error) {
            alert("Correo o contraseña incorrectos");
        }
    });
</script>
</body>

</html>
