<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciativas - ONG</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            margin: 0;
            padding: 0;
        }

        /* Hero Section */
        .hero {
            width: 100%;
            height: 500px;
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.4), rgba(5, 150, 105, 0.35)),
                url("../imagen/Iniciativa/banner.jpg");
            background-size: cover;
            background-position: center;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            animation: fadeInDown 1s ease-out forwards;
        }

        .hero-content {
            text-align: center;
            color: white;
            padding: 40px;
        }

        .hero h1 {
            font-size: 64px;
            font-weight: bold;
            margin-bottom: 20px;
            text-shadow: 3px 3px 10px rgba(0, 0, 0, 0.4);
        }

        /* Iniciativas Section */
        .iniciativas-section {
            max-width: 1400px;
            margin: 80px auto;
            padding: 0 40px;
        }

        .iniciativas-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 40px;
        }

        .iniciativa-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .iniciativa-card:nth-child(1) {
            animation-delay: 0.2s;
        }

        .iniciativa-card:nth-child(2) {
            animation-delay: 0.4s;
        }

        .iniciativa-card:nth-child(3) {
            animation-delay: 0.6s;
        }

        .iniciativa-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.15);
        }

        .iniciativa-imagen {
            width: 100%;
            height: 350px;
            object-fit: cover;
        }

        .iniciativa-titulo {
            padding: 30px;
            text-align: center;
        }

        .iniciativa-titulo h3 {
            font-size: 28px;
            color: #1f2937;
        }

        /* Galería de Ayudas Sociales */
        .galeria-section {
            max-width: 1400px;
            margin: 80px auto;
            padding: 0 40px;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 0.8s forwards;
        }

        .galeria-section h2 {
            font-size: 42px;
            color: #1f2937;
            text-align: center;
            margin-bottom: 50px;
        }

        .galeria-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
        }

        .galeria-imagen {
            width: 100%;
            height: 280px;
            object-fit: cover;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
            cursor: pointer;
            opacity: 0;
            animation: fadeInScale 0.6s ease-out forwards;
        }

        .galeria-imagen:nth-child(1) {
            animation-delay: 1s;
        }

        .galeria-imagen:nth-child(2) {
            animation-delay: 1.1s;
        }

        .galeria-imagen:nth-child(3) {
            animation-delay: 1.2s;
        }

        .galeria-imagen:nth-child(4) {
            animation-delay: 1.3s;
        }

        .galeria-imagen:nth-child(5) {
            animation-delay: 1.4s;
        }

        .galeria-imagen:nth-child(6) {
            animation-delay: 1.5s;
        }

        .galeria-imagen:nth-child(7) {
            animation-delay: 1.6s;
        }

        .galeria-imagen:nth-child(8) {
            animation-delay: 1.7s;
        }

        .galeria-imagen:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
        }

        /* Folletos Section */
        .folletos-section {
            max-width: 1400px;
            margin: 80px auto 100px;
            padding: 0 40px;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out 1.8s forwards;
        }

        .folletos-section h2 {
            font-size: 42px;
            color: #1f2937;
            text-align: center;
            margin-bottom: 50px;
        }

        .folletos-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
            max-width: 900px;
            margin: 0 auto;
        }

        .folleto-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.1);
            transition: all 0.3s;
            opacity: 0;
            animation: fadeInUp 0.8s ease-out forwards;
        }

        .folleto-card:nth-child(1) {
            animation-delay: 2s;
        }

        .folleto-card:nth-child(2) {
            animation-delay: 2.2s;
        }

        .folleto-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.15);
        }

        .folleto-imagen {
            width: 100%;
            height: 500px;
            object-fit: cover;
        }

        .folleto-info {
            padding: 30px;
            text-align: center;
        }

        .folleto-info h3 {
            font-size: 24px;
            color: #1f2937;
            margin-bottom: 20px;
        }

        .folleto-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .download-btn {
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white;
            border: none;
            padding: 16px 40px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
        }

        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
        }

        .view-btn {
            background: white;
            color: #10b981;
            border: 2px solid #10b981;
            padding: 16px 40px;
            font-size: 18px;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .view-btn:hover {
            background: #10b981;
            color: white;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
        }

        /* Animaciones */
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-50px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(50px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInScale {
            from {
                opacity: 0;
                transform: scale(0.8);
            }

            to {
                opacity: 1;
                transform: scale(1);
            }
        }

        /* Responsive */
        @media (max-width: 1024px) {
            .iniciativas-grid {
                grid-template-columns: 1fr;
            }

            .galeria-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .hero {
                height: 350px;
            }

            .hero h1 {
                font-size: 36px;
            }

            .iniciativas-section,
            .galeria-section,
            .folletos-section {
                padding: 0 20px;
                margin: 50px auto;
            }

            .galeria-section h2,
            .folletos-section h2 {
                font-size: 32px;
            }

            .galeria-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .folletos-grid {
                grid-template-columns: 1fr;
            }

            .folleto-buttons {
                flex-direction: column;
            }

            .download-btn,
            .view-btn {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <!-- Hero Section -->
    <section class="hero">
        <div class="hero-content">
            <h1>Nuestras Iniciativas</h1>
        </div>
    </section>

    <!-- Iniciativas -->
    <section class="iniciativas-section">
        <div class="iniciativas-grid">
            <article class="iniciativa-card">
                <img src="../imagen/Inicio/ConPorElArte.png" alt="Iniciativa Alimentación" class="iniciativa-imagen">
                <div class="iniciativa-titulo">
                    <h3>Conectados Por El Arte</h3>
                </div>
            </article>

            <article class="iniciativa-card">
                <img src="../imagen/Inicio/ConPorTecnologia.png" alt="Iniciativa Educación" class="iniciativa-imagen">
                <div class="iniciativa-titulo">
                    <h3>Conectados Por La Tecnología</h3>
                </div>
            </article>
            <article class="iniciativa-card">
                <img src="../imagen/Inicio/ConEnAccion.png" alt="Iniciativa Salud" class="iniciativa-imagen">
                <div class="iniciativa-titulo">
                    <h3>Conectados En Acción</h3>
                </div>
            </article>
        </div>
    </section>

    <!-- Galería de Ayudas Sociales -->
    <section class="galeria-section">
        <h2>Nuestras Ayudas Sociales</h2>
        <div class="galeria-grid">
            <img src="../imagen/Iniciativa/imagen1.jpg" alt="Ayuda Social 1" class="galeria-imagen">
            <img src="../imagen/Iniciativa/imagen2.jpg" alt="Ayuda Social 2" class="galeria-imagen">
            <img src="../imagen/Iniciativa/imagen3.jpg" alt="Ayuda Social 3" class="galeria-imagen">
            <img src="../imagen/Iniciativa/imagen4.jpg" alt="Ayuda Social 4" class="galeria-imagen">
            <img src="../imagen/Iniciativa/imagen5.jpg" alt="Ayuda Social 5" class="galeria-imagen">
            <img src="../imagen/Iniciativa/imagen6.jpg" alt="Ayuda Social 6" class="galeria-imagen">
            <img src="../imagen/Iniciativa/imagen7.jpg" alt="Ayuda Social 7" class="galeria-imagen">
            <img src="../imagen/Iniciativa/imagen8.jpg" alt="Ayuda Social 8" class="galeria-imagen">
        </div>
    </section>

    <!-- Folletos Descargables -->
    <section class="folletos-section">
        <h2>Folletos Descargables</h2>
        <div class="folletos-grid">
            <div class="folleto-card">
                <img src="../imagen/Iniciativa/boleta1.jpg" alt="Folleto Informativo" class="folleto-imagen">
                <div class="folleto-info">
                    <div class="folleto-buttons">
                        <a href="../imagen/Iniciativa/boleta1.jpg" download="Folleto_Informativo_2024.jpg">
                            <button class="download-btn">
                                <span>⬇</span>
                                Descargar Imagen
                            </button>
                        </a>
                        <a href="../imagen/Iniciativa/boleta1.jpg" target="_blank" class="view-btn">
                            <span>👁</span>
                            Ver Imagen
                        </a>
                    </div>
                </div>
            </div>

            <div class="folleto-card">
                <img src="../imagen/Iniciativa/boleta2.jpg" alt="Reporte Anual" class="folleto-imagen">
                <div class="folleto-info">
                    <div class="folleto-buttons">
                        <a href="../imagen/Iniciativa/boleta2.jpg" download="Reporte_Anual_2024.jpg">
                            <button class="download-btn">
                                <span>⬇</span>
                                Descargar Imagen
                            </button>
                        </a>
                        <a href="../imagen/Iniciativa/boleta2.jpg" target="_blank" class="view-btn">
                            <span>👁</span>
                            Ver Imagen
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </section>
</body>

</html>
