<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>COISIPV - Transformando vidas juntos</title>
    <link rel="stylesheet" href="../css/index.css">
</head>

<body>

    <!-- Overlay para cerrar sidebar en móvil -->
    <div class="overlay" id="overlay" onclick="cerrarSidebar()"></div>

    <div class="sidebar" id="sidebar">
        <div class="logo-section">
            <div class="logo">
                <img src="imagen/logo.jpg" alt="Logo COISIPV">
            </div>
            <h1>COISIPV</h1>
            <p class="tagline">Cooperación Orientada a la Integración Social del Inmigrante y Peruano Vulnerable</p>
            <button class="login-btn-small" onclick="window.open('contenido/login.html', '_blank')">
                <span class="icon">🔐</span>
                <span>Iniciar Sesión</span>
            </button>
        </div>

        <div class="menu">
            <button class="menu-item active" onclick="loadPage('inicio.html'); cerrarSidebar();" id="btn-inicio">
                <span class="icon">🏠</span>
                <span>Inicio</span>
            </button>
            <button class="menu-item" onclick="loadPage('nosotros.html'); cerrarSidebar();" id="btn-nosotros">
                <span class="icon">👥</span>
                <span>Nosotros</span>
            </button>
            <button class="menu-item" onclick="loadPage('Proyectos.html'); cerrarSidebar();" id="btn-Proyectos">
                <span class="icon">📋</span>
                <span>Iniciativas</span>
            </button>
            <button class="menu-item" onclick="loadPage('Voluntarios.html'); cerrarSidebar();" id="btn-Voluntarios">
                <span class="icon">🤝</span>
                <span>Voluntarios</span>
            </button>
            <button class="menu-item" onclick="loadPage('Noticias.html'); cerrarSidebar();" id="btn-Noticias">
                <span class="icon">📰</span>
                <span>Noticias</span>
            </button>
            <button class="menu-item" onclick="loadPage('Contacto.html'); cerrarSidebar();" id="btn-Contacto">
                <span class="icon">📧</span>
                <span>Contacto</span>
            </button>
        </div>
    </div>

    <!-- Topbar visible solo en móvil -->
    <div class="main-content">
        <div class="topbar-mobile">
            <button class="hamburger" onclick="abrirSidebar()">☰</button>
            <span class="topbar-mobile-title">COISIPV</span>
        </div>

        <div class="content-frame" id="content-area">
            <iframe src="contenido/inicio.html" style="
                    width: 100%;
                    height: 100%;
                    border: none;
                    border-radius: 0;
                    background: transparent;
                    display: block;
                ">
            </iframe>
        </div>
    </div>

    <div class="login-modal" id="loginModal">
        <div class="login-box">
            <h2>🔐 Iniciar Sesión</h2>
            <p>Panel de Administración COISIPV</p>

            <div class="error-message" id="errorMessage">
                Usuario o contraseña incorrectos
            </div>

            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Correo Electrónico</label>
                    <input type="email" id="emailInput" required placeholder="usuario@ejemplo.com">
                </div>

                <div class="form-group">
                    <label>Contraseña</label>
                    <input type="password" id="passwordInput" required placeholder="Ingresa tu contraseña">
                </div>

                <button type="submit" class="login-submit">Iniciar Sesión</button>
                <button type="button" class="login-cancel" onclick="closeLoginModal()">Cancelar</button>
            </form>
        </div>
    </div>

    <script>
        function abrirSidebar() {
            document.getElementById('sidebar').classList.add('open');
            document.getElementById('overlay').classList.add('show');
        }

        function cerrarSidebar() {
            document.getElementById('sidebar').classList.remove('open');
            document.getElementById('overlay').classList.remove('show');
        }
    </script>
    <script src="js/index.js"></script>
    <script type="module" src="/firebase.js"></script>
</body>

</html>
